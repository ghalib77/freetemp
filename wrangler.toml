name            = "tempmail-worker"
main            = "worker.js"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Ganti MAIL_DOMAIN dengan domain kamu ─────────────────────────────────────
[vars]
MAIL_DOMAIN = "mediasaya.web.id"

# ── KV Namespace ─────────────────────────────────────────────────────────────
# Jalankan dulu: npx wrangler kv namespace create MAIL_KV
# Lalu salin id-nya ke sini ↓
[[kv_namespaces]]
binding = "MAIL_KV"
id      = "366e8c8e0a7941f8983d8fef35983109"

# ── Email Routing ─────────────────────────────────────────────────────────────
# Worker ini akan menangani SEMUA email yang masuk ke domain kamu
[[email.routes]]
pattern   = "*@mediasaya.web.id"
zone_name = "mediasaya.web.id"

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeTemp — Disposable Email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --surface2:  #161616;
      --border:    #222222;
      --border2:   #2a2a2a;
      --fg:        #f5f5f5;
      --fg2:       #a0a0a0;
      --fg3:       #6b6b6b;
      --accent:    #e0e0e0;
      --green:     #4ade80;
      --red:       #f87171;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background-color: var(--bg);
      background-image: radial-gradient(circle, #2a2a2a 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── LAYOUT ── */
    .page {
      width: 100%;
      max-width: 720px;
      padding: 0 20px 80px;
    }

    /* ── HEADER ── */
    header {
      padding: 48px 0 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--border2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
    }

    .logo-icon svg { width: 16px; height: 16px; color: var(--fg2); }

    .logo-text {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .logo-text span { color: var(--fg3); }

    .header-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* ── EMAIL CARD ── */
    .email-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .email-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
    }

    .email-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--fg3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .email-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .email-address {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }

    .email-address .domain { color: var(--fg3); }

    .btn {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--fg2);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      line-height: 1;
    }

    .btn:hover {
      border-color: var(--fg3);
      color: var(--fg);
      background: #1a1a1a;
    }

    .btn:active { transform: scale(0.97); }

    .btn.copied {
      border-color: var(--green);
      color: var(--green);
    }

    .btn-danger:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ── INBOX SECTION ── */
    .inbox-actions {
      display: flex;
      align-items:center;
      gap: 10px;
    }
    .inbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .inbox-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg2);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .inbox-count {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      color: var(--fg3);
    }

    .countdown {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg3);
      text-align: right;
      margin-bottom: 10px;
      height: 18px;
    }

    /* ── INBOX LIST ── */
    .inbox-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .inbox-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s ease;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 4px 12px;
    }

    .inbox-item:last-child { border-bottom: none; }

    .inbox-item:hover { background: rgba(255,255,255,0.04); }

    .inbox-item:active { background: rgba(255,255,255,0.06); }

    .item-from {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--fg2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      grid-column: 1;
      grid-row: 1;
    }

    .item-time {
      font-size: 11px;
      color: var(--fg3);
      grid-column: 2;
      grid-row: 1;
      white-space: nowrap;
    }

    .item-subject {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      grid-column: 1 / 3;
      grid-row: 2;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border: 1px solid var(--border2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-icon svg { color: var(--fg3); }

    .empty-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg2);
      margin-bottom: 6px;
    }

    .empty-sub {
      font-size: 12px;
      color: var(--fg3);
      line-height: 1.6;
    }

    /* ── LOADING SKELETON ── */
    .skeleton-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .skeleton-item:last-child { border-bottom: none; }

    .skel {
      background: linear-gradient(90deg, var(--surface2) 25%, #1e1e1e 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skel-sm  { height: 10px; width: 40%; margin-bottom: 8px; }
    .skel-lg  { height: 13px; width: 75%; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--fg2);
      transition: transform 0.25s ease;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--red); color: var(--red); }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      width: 100%;
      max-width: 680px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      transform: translateY(12px) scale(0.98);
      transition: transform 0.2s ease;
      overflow: hidden;
    }

    .modal-backdrop.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-head {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .modal-subject {
      font-size: 15px;
      font-weight: 600;
      color: var(--fg);
      line-height: 1.4;
    }

    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .modal-close:hover { border-color: var(--fg3); color: var(--fg); }

    .modal-meta {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }

    .meta-row {
      display: flex;
      gap: 12px;
      font-size: 12px;
    }

    .meta-key {
      font-family: var(--mono);
      color: var(--fg3);
      min-width: 48px;
      flex-shrink: 0;
    }

    .meta-val {
      color: var(--fg2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
    }

    .modal-body iframe {
      width: 100%;
      height: 100%;
      min-height: 340px;
      border: none;
      background: #fff;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      header { padding: 32px 0 24px; }
      .email-address { font-size: 13px; }
      .modal { max-height: 92vh; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <span class="logo-text">Free<span>Temp</span></span>
    </div>
    <div class="header-tag">disposable inbox</div>
  </header>

  <!-- EMAIL CARD -->
  <div class="email-card">
    <div class="email-label">Your temporary address</div>
    <div class="email-row">
      <div class="email-address" id="emailDisplay">
        <span id="emailUser">—</span><span class="domain" id="emailDomain"></span>
      </div>
      <button class="btn" id="copyBtn" onclick="copyEmail()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        Copy
      </button>
    </div>
    <div class="card-actions">
      <button class="btn btn-danger" onclick="regenerateEmail()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
        New Address
      </button>
    </div>
  </div>

  <!-- INBOX -->
  <div class="inbox-header">
    <div class="inbox-title">
      Inbox
      <span class="inbox-count" id="inboxCount">0</span>
    </div>
    <div class="inbox-actions">
      <button class="btn" id="refreshBtn" onclick="manualRefresh()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
          </svg>
          Refresh
      </button>
      <div class="countdown" id="countdown">Auto-refresh in 5s</div>
    </div>
  </div>

  <div class="inbox-list" id="inboxList">
    <!-- populated by JS -->
  </div>

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="handleBackdropClick(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-subject" id="modalSubject">—</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-meta">
      <div class="meta-row"><span class="meta-key">From</span><span class="meta-val" id="modalFrom">—</span></div>
      <div class="meta-row"><span class="meta-key">To</span><span class="meta-val" id="modalTo">—</span></div>
      <div class="meta-row"><span class="meta-key">Date</span><span class="meta-val" id="modalDate">—</span></div>
    </div>
    <div class="modal-body">
      <iframe id="modalIframe" sandbox="allow-same-origin" title="Email body"></iframe>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  const DOMAIN      = 'mediasaya.web.id';
  const API_BASE    = `https://freetemp.muhamadghalib7.workers.dev`;   // adjust after deploy
  const POLL_MS     = 5000;
  const ADJECTIVES  = ['quick','dark','swift','bright','cold','sharp','calm','bold','slow','wild','tiny','vast','soft','deep','loud'];
  const NOUNS       = ['fox','owl','ray','arc','sky','dot','fin','hex','jet','kex','pix','row','sox','tag','vex'];

  // ── STATE ───────────────────────────────────────────────────────────────────
  let currentEmail  = '';
  let emails        = [];
  let countdown     = POLL_MS / 1000;
  let countdownTimer = null;
  let pollTimer      = null;
  let tabActive      = !document.hidden;

  // ── INIT ────────────────────────────────────────────────────────────────────
  function init() {
    currentEmail = localStorage.getItem('freetemp_email') || generateEmail();
    renderEmailAddress();
    fetchInbox();
    startCountdown();

    document.addEventListener('visibilitychange', () => {
      tabActive = !document.hidden;
      if (tabActive) {
        fetchInbox();
        startCountdown();
      } else {
        stopCountdown();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  }

  // ── EMAIL GENERATION ────────────────────────────────────────────────────────
  function generateEmail() {
    const adj  = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
    const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
    const num  = String(Math.floor(Math.random() * 9000) + 1000);
    const addr = `${adj}${noun}${num}@${DOMAIN}`;
    localStorage.setItem('freetemp_email', addr);
    return addr;
  }

  function renderEmailAddress() {
    const [user, domain] = currentEmail.split('@');
    document.getElementById('emailUser').textContent   = user;
    document.getElementById('emailDomain').textContent = '@' + domain;
  }

  function regenerateEmail() {
    if (!confirm('Generate a new address? Your current inbox will be cleared.')) return;
    currentEmail = generateEmail();
    emails = [];
    renderEmailAddress();
    renderInbox();
    fetchInbox();
    resetCountdown();
  }

  // ── CLIPBOARD ───────────────────────────────────────────────────────────────
  async function copyEmail() {
    try {
      await navigator.clipboard.writeText(currentEmail);
      const btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
      }, 2000);
    } catch {
      showToast('Copy failed — select manually', true);
    }
  }

  // ── FETCH INBOX ─────────────────────────────────────────────────────────────
  async function fetchInbox() {
    const isFirst = emails.length === 0;
    if (isFirst) renderSkeleton();

    try {
      const url = `${API_BASE}/api/inbox?address=${encodeURIComponent(currentEmail)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      emails = await res.json();
      renderInbox();
    } catch (err) {
      if (isFirst) renderInbox();   // show empty rather than skeleton
      showToast('Could not fetch inbox — retrying…', true);
    }
  }

  function manualRefresh() {
    fetchInbox();
    resetCountdown();
  }

  // ── COUNTDOWN ───────────────────────────────────────────────────────────────
  function startCountdown() {
    stopCountdown();
    countdown = POLL_MS / 1000;
    updateCountdownUI();

    countdownTimer = setInterval(() => {
      if (!tabActive) return;
      countdown--;
      if (countdown <= 0) {
        countdown = POLL_MS / 1000;
        fetchInbox();
      }
      updateCountdownUI();
    }, 1000);
  }

  function stopCountdown() {
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  }

  function resetCountdown() {
    countdown = POLL_MS / 1000;
    updateCountdownUI();
  }

  function updateCountdownUI() {
    const el = document.getElementById('countdown');
    if (!tabActive) {
      el.textContent = 'Auto-refresh paused (tab hidden)';
    } else {
      el.textContent = `Auto-refresh in ${countdown}s`;
    }
  }

  // ── RENDER ──────────────────────────────────────────────────────────────────
  function renderSkeleton() {
    const list = document.getElementById('inboxList');
    list.innerHTML = [1,2,3].map(() => `
      <div class="skeleton-item">
        <div class="skel skel-sm"></div>
        <div class="skel skel-lg"></div>
      </div>
    `).join('');
  }

  function renderInbox() {
    document.getElementById('inboxCount').textContent = emails.length;
    const list = document.getElementById('inboxList');

    if (!emails.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
          <div class="empty-title">No emails yet</div>
          <div class="empty-sub">Copy your address above and share it.<br>Messages appear here automatically.</div>
        </div>
      `;
      return;
    }

    list.innerHTML = emails.map(e => `
      <div class="inbox-item" onclick="openEmail('${e.id}')">
        <span class="item-from">${escHtml(e.from)}</span>
        <span class="item-time">${relTime(e.receivedAt)}</span>
        <span class="item-subject">${escHtml(e.subject || '(no subject)')}</span>
      </div>
    `).join('');
  }

  // ── MODAL ───────────────────────────────────────────────────────────────────
  async function openEmail(id) {
    const backdrop = document.getElementById('modalBackdrop');
    backdrop.classList.add('open');

    // Find in local cache first, then fetch full body
    const cached = emails.find(e => e.id === id);
    if (cached) {
      document.getElementById('modalSubject').textContent = cached.subject || '(no subject)';
      document.getElementById('modalFrom').textContent    = cached.from;
      document.getElementById('modalTo').textContent      = cached.to;
      document.getElementById('modalDate').textContent    = fmtDate(cached.receivedAt);
    }

    try {
      const url = `${API_BASE}/api/email/${id}?address=${encodeURIComponent(currentEmail)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const email = await res.json();

      document.getElementById('modalSubject').textContent = email.subject || '(no subject)';
      document.getElementById('modalFrom').textContent    = email.from;
      document.getElementById('modalTo').textContent      = email.to;
      document.getElementById('modalDate').textContent    = fmtDate(email.receivedAt);

      const iframe = document.getElementById('modalIframe');
      const body   = email.bodyHtml || `<pre style="font-family:monospace;padding:20px;color:#333;">${escHtml(email.bodyText || '')}</pre>`;
      iframe.srcdoc = body;
    } catch {
      showToast('Could not load email body', true);
    }
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    setTimeout(() => { document.getElementById('modalIframe').srcdoc = ''; }, 300);
  }

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModal();
  }

  // ── TOAST ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className   = 'show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.className = ''; }, 3500);
  }

  // ── HELPERS ─────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function relTime(iso) {
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60)   return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleString(undefined, {
      month:'short', day:'numeric', year:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  }

  // ── START ───────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
